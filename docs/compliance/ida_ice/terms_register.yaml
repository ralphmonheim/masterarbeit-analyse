- term_id: EQUA-REVERSE-ENGINEERING-001
  source_id: equa-eula-2023-12
  topic: reverse_engineering
  section: "3(b)"
  short_quote: "decompile, reverse engineer, disassemble"
  paraphrase: "Software und Teile davon duerfen weder dekompiliert noch per Reverse Engineering oder Disassemblierung untersucht werden; auch zugrunde liegende Ideen oder Algorithmen duerfen nicht ermittelt werden."
  impact_on_project: "Allgemeiner Formatparser, Bibliotheksauszug, Binäranalyse oder Algorithmusrekonstruktion sind ausgeschlossen."
  confidence: high
  requires_legal_review: false
