repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: .venv/Scripts/ruff.exe check --fix --no-cache
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: .venv/Scripts/ruff.exe format --no-cache
        language: system
        types_or: [python, pyi]

