# Zentrale Plot-Template-Konfiguration.
#
# Hier werden alle Template-spezifischen Defaults in einer einzigen Datei
# zusammengefasst. Die Datei kann mit der CLI-Option
#   --plot-template-config src/ma_analyse/settings/plot_templates.toml
# geladen werden.

[heating_year]
setpoint_min = 21.0
setpoint_max = 26.0
temperature_ymin = -20.0
temperature_ymax = 40.0
show_setpoint_band = false
show_outdoor_temperature = false
show_operative_temperature = false
outdoor_column = "tair"

[heating_overlay]
setpoint_min = 21.0
setpoint_max = 26.0
temperature_ymin = -20.0
temperature_ymax = 40.0
show_setpoint_band = true
show_outdoor_temperature = true
show_operative_temperature = true
outdoor_column = "tair"

[[heating_overlay.default_overlays]]
id = "outdoor_temperature"
label = "Außenlufttemperatur"
source = "aux"
column = "tair"
axis = "temperature"
enabled = true

[[heating_overlay.default_overlays]]
id = "operative_temperature"
label = "Operative Temperatur"
source = "csv"
column = "temperatures_top"
fallback_columns = ["local_de_comf_diag_t_top"]
axis = "temperature"
enabled = true

